name: Limpeza FTP (temporario)

# Remove lixo do /www deixado por tentativas anteriores:
# - www/ (copia aninhada do primeiro deploy)
# - .git/ .github/ README.md .gitignore (do clone da antiga Publicacao via Git)
# NAO toca nos arquivos do site. Remover este workflow depois de rodar.

on:
  workflow_dispatch:

jobs:
  limpar:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Limpar /www
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          set ftp:ssl-protect-data true;
          open -u '$FTP_USER','$FTP_PASS' 'ftp://$FTP_HOST';
          (rm -r www || echo 'sem www aninhado');
          (rm -r .git || echo 'sem .git');
          (rm -r .github || echo 'sem .github');
          (rm README.md || echo 'sem README');
          (rm .gitignore || echo 'sem .gitignore');
          echo '=== conteudo final de /www ===';
          cls -a -l;
          bye;
          "
